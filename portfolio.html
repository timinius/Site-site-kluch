<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портфолио — WEB.EKB</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f;
  --bg2: #0f1018;
  --accent: #5ab4f5;
  --text: #f0ede8;
  --muted: #666;
  --border: rgba(90,180,245,0.1);
  --font-display: 'Unbounded', sans-serif;
  --font-body: 'Onest', sans-serif;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-weight: 300; overflow-x: hidden; cursor: none; }

.cursor { position: fixed; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); mix-blend-mode: difference; transition: transform 0.1s; }
.cursor-ring { position: fixed; width: 40px; height: 40px; border: 1px solid var(--accent); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); opacity: 0.5; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 1.5rem 4rem;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.logo { text-decoration: none; display: flex; align-items: center; }
.logo-img { height: 32px; width: auto; display: block; }
.nav-right { display: flex; gap: 1rem; align-items: center; }
.nav-back { color: var(--muted); text-decoration: none; font-family: var(--font-display); font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
.nav-back:hover { color: var(--text); }
.nav-portfolio { color: var(--text); text-decoration: none; font-family: var(--font-display); font-weight: 700; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.75rem 1.5rem; border: 1px solid var(--border); transition: border-color 0.2s, color 0.2s; }
.nav-portfolio:hover { border-color: var(--accent); color: var(--accent); }
.nav-cta { background: var(--accent); color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.75rem 1.5rem; border: none; cursor: none; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
.nav-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(90,180,245,0.3); }

.hero {
  min-height: 100vh;
  display: flex; flex-direction: column; justify-content: center;
  padding: 8rem 4rem 4rem;
  position: relative; overflow: hidden;
}
.hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(90,180,245,0.06) 0%, transparent 70%); }
.hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(90,180,245,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(90,180,245,0.03) 1px, transparent 1px); background-size: 80px 80px; }
.hero-inner { position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 1.5rem; }
.hero-tag { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.72rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; }
.hero-tag::before, .hero-tag::after { content: ''; width: 30px; height: 1px; background: var(--accent); }
.hero-title { font-family: var(--font-display); font-weight: 900; font-size: clamp(2.5rem, 6vw, 5.5rem); line-height: 0.95; letter-spacing: -0.04em; }
.hero-title em { font-style: normal; color: var(--accent); display: block; }
.hero-sub { color: var(--muted); font-size: 1rem; max-width: 500px; line-height: 1.7; }

/* 3D browser mockups */
.mockups { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 2rem; align-items: end; margin-top: 3rem; perspective: 1200px; }
.mockup-wrap { opacity: 0; animation: fadeUp 0.8s ease forwards; }
.mockup-wrap:nth-child(1) { animation-delay: 0.3s; }
.mockup-wrap:nth-child(2) { animation-delay: 0.5s; transform: translateY(40px); }
.mockup-wrap:nth-child(3) { animation-delay: 0.7s; transform: translateY(70px); }
.browser { background: #13161f; border-radius: 12px; border: 1px solid rgba(90,180,245,0.2); overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 40px rgba(90,180,245,0.06); transform: rotateY(-8deg) rotateX(4deg); transition: transform 0.4s ease, box-shadow 0.4s ease; }
.browser:hover { transform: rotateY(-4deg) rotateX(2deg) translateY(-8px); box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 60px rgba(90,180,245,0.12); }
.browser-bar { display: flex; align-items: center; gap: 6px; padding: 10px 14px; background: #0d0f17; border-bottom: 1px solid rgba(90,180,245,0.1); }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
.browser-url { margin-left: 8px; flex: 1; text-align: center; background: rgba(255,255,255,0.05); border-radius: 4px; padding: 3px 12px; font-size: 10px; color: rgba(255,255,255,0.3); font-family: var(--font-body); }
.browser-screen { overflow: hidden; }
.browser-screen img { width: 100%; height: auto; display: block; }

/* Coming soon section */
.coming-soon {
  padding: 6rem 4rem;
  text-align: center;
  border-top: 1px solid var(--border);
  background: var(--bg2);
}
.coming-soon-label { font-size: 0.7rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem; }
.coming-soon-label::before, .coming-soon-label::after { content: ''; width: 28px; height: 1px; background: var(--accent); }
.coming-soon-title { font-family: var(--font-display); font-weight: 700; font-size: clamp(1.5rem, 3vw, 2.5rem); letter-spacing: -0.03em; margin-bottom: 0.75rem; }
.coming-soon-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
.btn { background: var(--accent); color: #fff; font-family: var(--font-display); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 1rem 2.5rem; border: none; cursor: none; text-decoration: none; display: inline-block; transition: transform 0.2s, box-shadow 0.2s; }
.btn:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(90,180,245,0.35); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="cursor" id="cur"></div>
<div class="cursor-ring" id="ring"></div>

<nav>
  <a href="index.html" class="logo"><img src="logo.svg" class="logo-img" alt="WEB.EKB"></a>
  <div class="nav-right">
    <a href="index.html" class="nav-back">← Главная</a>
    <a href="index.html#contact" class="nav-cta">Оставить заявку</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-inner">
    <div class="hero-tag">Наши работы</div>
    <h1 class="hero-title">Проекты,<br><em>которые работают</em></h1>
    <p class="hero-sub">Сайты, баннеры, соцсети — каждый под задачу клиента. Скоро здесь появятся все наши работы.</p>
    <div class="mockups">
      <div class="mockup-wrap">
        <div class="browser">
          <div class="browser-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><div class="browser-url">webekb.ru</div></div>
          <div class="browser-screen" style="background:#13161f;height:200px;display:flex;align-items:center;justify-content:center;">
            <svg width="120" height="40" viewBox="0 0 120 40"><text x="60" y="28" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="22" fill="rgba(90,180,245,0.3)">WEB.EKB</text></svg>
          </div>
        </div>
      </div>
      <div class="mockup-wrap">
        <div class="browser">
          <div class="browser-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><div class="browser-url">webekb.ru</div></div>
          <div class="browser-screen" style="background:#0f1420;height:160px;display:flex;align-items:center;justify-content:center;">
            <svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="40" r="30" fill="none" stroke="rgba(90,180,245,0.2)" stroke-width="1"/><circle cx="40" cy="40" r="20" fill="none" stroke="rgba(90,180,245,0.15)" stroke-width="1"/><circle cx="40" cy="40" r="8" fill="rgba(90,180,245,0.2)"/></svg>
          </div>
        </div>
      </div>
      <div class="mockup-wrap">
        <div class="browser">
          <div class="browser-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><div class="browser-url">webekb.ru</div></div>
          <div class="browser-screen" style="background:#0d1525;height:130px;display:flex;flex-direction:column;gap:8px;align-items:flex-start;padding:16px;">
            <div style="width:80%;height:8px;background:rgba(255,255,255,0.15);border-radius:2px"></div>
            <div style="width:60%;height:8px;background:rgba(255,255,255,0.1);border-radius:2px"></div>
            <div style="width:40%;height:20px;background:rgba(90,180,245,0.4);border-radius:3px;margin-top:4px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="coming-soon">
  <div class="coming-soon-label">Портфолио</div>
  <h2 class="coming-soon-title">Скоро здесь будут наши работы</h2>
  <p class="coming-soon-sub">Пока смотрите — обсудим ваш проект прямо сейчас</p>
  <a href="index.html#contact" class="btn">Оставить заявку →</a>
</div>

<script>
const cur=document.getElementById('cur'),ring=document.getElementById('ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
(function a(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a)})();
</script>
</body>
</html>
